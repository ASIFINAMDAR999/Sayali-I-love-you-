<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />

    <title>Click below button to see asif heart</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3CradialGradient id='g' cx='50%25' cy='35%25' r='70%25'%3E%3Cstop offset='0%25' stop-color='%23ff9abb'/%3E%3Cstop offset='45%25' stop-color='%23ff2d75'/%3E%3Cstop offset='100%25' stop-color='%23b8003d'/%3E%3C/radialGradient%3E%3Cfilter id='s' x='-20%25' y='-20%25' width='140%25' height='140%25'%3E%3CfeDropShadow dx='0' dy='4' stdDeviation='4' flood-color='%23ff2d75' flood-opacity='.55'/%3E%3C/filter%3E%3C/defs%3E%3Crect width='64' height='64' rx='16' fill='%23050508'/%3E%3Cpath filter='url(%23s)' fill='url(%23g)' d='M32 54S9 40.5 9 23.8C9 15.6 15.1 10 22.2 10c4.4 0 7.8 2 9.8 5.1C34 12 37.4 10 41.8 10 48.9 10 55 15.6 55 23.8 55 40.5 32 54 32 54Z'/%3E%3C/svg%3E" />
    <style>
        :root {
            --bg: #050508;
            --pink: #ff2d75;
            --pink-soft: #ff7aa8;
            --red: #ff174f;
            --white: #fff7fb;
            --deep: #020208;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--white);
            background:
                radial-gradient(circle at 50% 45%, rgba(255, 45, 117, 0.16), transparent 34%),
                radial-gradient(circle at 50% 74%, rgba(255, 0, 80, 0.2), transparent 26%),
                linear-gradient(180deg, #09090f, var(--bg));
        }

        .stage {
            min-height: 100vh;
            display: grid;
            place-items: center;
            perspective: 900px;
            padding: 24px 18px;
            position: relative;
        }

        .intro {
            text-align: center;
            z-index: 8;
            transition: opacity 0.45s ease, transform 0.45s ease;
        }

        .intro.hide {
            opacity: 0;
            transform: translateY(16px) scale(0.96);
            pointer-events: none;
        }

        .main-title {
            font-size: clamp(34px, 7vw, 70px);
            font-weight: 900;
            line-height: 1;
            text-shadow: 0 0 28px rgba(255, 45, 117, 0.7);
        }

        .log {
            margin: 22px auto 0;
            width: min(560px, 92vw);
            text-align: left;
            font-family: "Cascadia Code", Consolas, monospace;
            font-size: clamp(11px, 2vw, 13px);
            color: rgba(255, 122, 168, 0.9);
            line-height: 1.7;
        }

        .log-line {
            opacity: 0;
            transform: translateY(8px);
            animation: lineIn 0.45s ease forwards;
        }
        .log-line:nth-child(2) {
            animation-delay: 0.45s;
        }
        .log-line:nth-child(3) {
            animation-delay: 0.9s;
        }
        .log-line:nth-child(4) {
            animation-delay: 1.35s;
        }

        @keyframes lineIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .button {
            margin-top: 22px;
            border: 0;
            border-radius: 10px;
            padding: 13px 24px;
            color: white;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            background: linear-gradient(135deg, #ff2d75, #b8003d);
            box-shadow: 0 12px 38px rgba(255, 45, 117, 0.36);
            opacity: 0;
            transform: translateY(10px);
            animation: buttonIn 0.45s ease forwards 2s;
        }
        .button:hover {
            transform: translateY(-1px);
            filter: brightness(1.08);
        }

        @keyframes buttonIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .heart-wrap {
            position: absolute;
            width: min(92vw, 760px);
            aspect-ratio: 1 / 0.9;
            transform-style: preserve-3d;
            opacity: 0;
            pointer-events: none;
        }
        .heart-wrap.show {
            opacity: 1;
            pointer-events: auto;
            animation: heartAppear 1.1s ease forwards, beat 1.7s ease-in-out infinite 1.2s;
        }

        @keyframes heartAppear {
            from {
                transform: rotateX(18deg) scale(0.72);
                filter: blur(6px);
            }
            to {
                transform: rotateX(0deg) scale(1);
                filter: blur(0);
            }
        }
        @keyframes beat {
            0%,
            100% {
                scale: 1;
            }
            14% {
                scale: 1.035;
            }
            28% {
                scale: 1;
            }
            42% {
                scale: 1.025;
            }
            70% {
                scale: 1;
            }
        }

        .heart-word {
            position: absolute;
            left: calc(var(--x) * 1%);
            top: calc(var(--y) * 1%);
            font-family: "Cascadia Code", Consolas, monospace;
            font-size: clamp(7px, 1.3vw, 13px);
            white-space: nowrap;
            color: hsl(var(--hue), 100%, var(--light));
            text-shadow: 0 0 7px rgba(255, 45, 117, 0.85), 0 0 18px rgba(255, 45, 117, 0.5);
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.2) rotate(var(--rot));
            animation: wordIn 0.75s cubic-bezier(.2, .9, .2, 1.15) forwards;
            animation-delay: calc(var(--delay) * 1ms);
        }

        @keyframes wordIn {
            to {
                opacity: var(--opacity);
                transform: translate(-50%, -50%) scale(1) rotate(var(--rot));
            }
        }

        .center-text {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            font-size: clamp(34px, 7vw, 72px);
            font-weight: 950;
            text-align: center;
            color: white;
            text-shadow: 0 0 22px rgba(255, 255, 255, 0.5), 0 0 46px rgba(255, 45, 117, 0.9);
            opacity: 0;
            transform: scale(0.9);
            animation: centerIn 0.8s ease forwards 1.15s;
            pointer-events: none;
        }

        @keyframes centerIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* ── Open My Heart button ── */
        .open-heart-btn {
            position: absolute;
            bottom: -52px;
            left: 50%;
            transform: translateX(-50%);
            border: 2px solid rgba(255, 45, 117, 0.55);
            border-radius: 30px;
            padding: 14px 30px;
            background: rgba(10, 4, 12, 0.75);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            color: #fff;
            font-size: clamp(13px, 1.6vw, 16px);
            font-weight: 700;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
            letter-spacing: 1.2px;
            white-space: nowrap;
            transition: all 0.35s ease;
            box-shadow: 0 0 24px rgba(255, 45, 117, 0.25);
        }
        .heart-wrap.show .open-heart-btn {
            animation: btnReveal 0.7s ease forwards 2.8s, btnPulse 2.4s ease-in-out infinite 3.6s;
            pointer-events: auto;
        }
        @keyframes btnReveal {
            to {
                opacity: 1;
            }
        }
        @keyframes btnPulse {
            0%,
            100% {
                box-shadow: 0 0 24px rgba(255, 45, 117, 0.25);
            }
            50% {
                box-shadow: 0 0 44px rgba(255, 45, 117, 0.7), 0 0 72px rgba(255, 45, 117, 0.3);
            }
        }
        .open-heart-btn:hover {
            background: rgba(255, 45, 117, 0.22);
            border-color: rgba(255, 122, 168, 0.9);
            box-shadow: 0 0 38px rgba(255, 45, 117, 0.55), 0 0 70px rgba(255, 45, 117, 0.2);
            transform: translateX(-50%) scale(1.06);
        }

        /* ── Gallery Overlay ── */
        .gallery-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(2, 2, 8, 0.92);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            padding: 0;
        }
        .gallery-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Vignette */
        .gallery-overlay::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 55%, rgba(2, 2, 8, 0.75) 100%);
            pointer-events: none;
            z-index: 1;
        }

        .gallery-stage {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 1200px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            animation: galleryScaleIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes galleryScaleIn {
            from {
                transform: scale(0.94);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Top bar */
        .gallery-top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px 10px;
            flex-shrink: 0;
            z-index: 5;
        }
        .gallery-title {
            font-size: clamp(16px, 2vw, 22px);
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 45, 117, 0.6);
            letter-spacing: 1.5px;
            user-select: none;
        }
        .gallery-close {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid rgba(255, 45, 117, 0.45);
            background: rgba(10, 4, 14, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: grid;
            place-items: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        .gallery-close:hover {
            background: rgba(255, 45, 117, 0.3);
            border-color: #ff7aa8;
            box-shadow: 0 0 30px rgba(255, 45, 117, 0.55);
            transform: scale(1.1);
        }

        /* Scrollable grid */
        .gallery-scroll-view {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 8px 20px 20px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 45, 117, 0.3) transparent;
            mask-image: linear-gradient(to bottom, transparent 0%, black 3%, black 97%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 3%, black 97%, transparent 100%);
        }
        .gallery-scroll-view::-webkit-scrollbar {
            width: 5px;
        }
        .gallery-scroll-view::-webkit-scrollbar-track {
            background: transparent;
        }
        .gallery-scroll-view::-webkit-scrollbar-thumb {
            background: rgba(255, 45, 117, 0.35);
            border-radius: 10px;
        }

        /* Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-auto-flow: dense;
            gap: 14px;
            padding-bottom: 10px;
        }
        @media (min-width: 640px) {
            .gallery-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 16px;
            }
        }
        @media (min-width: 1024px) {
            .gallery-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 18px;
            }
        }

        /* Cards */
        .gallery-card {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            background: #0a0a14;
            border: 2px solid rgba(255, 45, 117, 0.25);
            box-shadow: 0 12px 50px rgba(255, 45, 117, 0.18), 0 4px 20px rgba(0, 0, 0, 0.5);
            transition: all 0.45s cubic-bezier(0.22, 1, 0.36, 1);
            cursor: pointer;
            aspect-ratio: 3 / 4;
            grid-column: span 1;
        }
        .gallery-card.landscape {
            aspect-ratio: 4 / 3;
            grid-column: span 2;
        }
        .gallery-card.square-ish {
            aspect-ratio: 1 / 1;
        }
        .gallery-card:hover {
            transform: translateY(-6px) scale(1.03);
            border-color: rgba(255, 122, 168, 0.7);
            box-shadow: 0 20px 60px rgba(255, 45, 117, 0.4), 0 8px 30px rgba(0, 0, 0, 0.6);
            z-index: 3;
        }
        .gallery-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .gallery-card:hover img {
            transform: scale(1.08);
        }

        /* Caption overlay */
        .card-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 16px 14px;
            background: linear-gradient(to top, rgba(2, 2, 8, 0.9) 0%, rgba(2, 2, 8, 0.5) 60%, transparent 100%);
            color: #fff;
            font-size: clamp(12px, 1.3vw, 15px);
            font-weight: 700;
            letter-spacing: 0.8px;
            text-shadow: 0 0 14px rgba(255, 45, 117, 0.6);
            opacity: 0;
            transform: translateY(12px);
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none;
            text-align: center;
        }
        .gallery-card:hover .card-caption {
            opacity: 1;
            transform: translateY(0);
        }

        /* Loading shimmer */
        .gallery-card.loading {
            animation: shimmer 1.6s ease-in-out infinite;
            background: linear-gradient(110deg, #0a0a16 30%, #1a1020 50%, #0a0a16 70%);
            background-size: 200% 100%;
        }
        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }

        /* Bottom bar */
        .gallery-bottom-bar {
            flex-shrink: 0;
            padding: 10px 24px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            z-index: 5;
        }
        .progress-track {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff2d75, #ff7aa8);
            border-radius: 10px;
            width: 0%;
            transition: width 0.15s linear;
            box-shadow: 0 0 12px rgba(255, 45, 117, 0.6);
        }
        .progress-fill.paused {
            animation: progressPulse 1.5s ease-in-out infinite;
        }
        @keyframes progressPulse {
            0%,
            100% {
                box-shadow: 0 0 12px rgba(255, 45, 117, 0.6);
            }
            50% {
                box-shadow: 0 0 28px rgba(255, 122, 168, 1), 0 0 50px rgba(255, 45, 117, 0.5);
            }
        }
        .play-pause-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid rgba(255, 45, 117, 0.5);
            background: rgba(10, 4, 14, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            display: grid;
            place-items: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        .play-pause-btn:hover {
            background: rgba(255, 45, 117, 0.28);
            border-color: #ff7aa8;
            box-shadow: 0 0 26px rgba(255, 45, 117, 0.5);
            transform: scale(1.1);
        }
        .time-indicator {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.55);
            letter-spacing: 0.6px;
            user-select: none;
            white-space: nowrap;
            min-width: 50px;
            text-align: center;
        }

        /* Glow */
        .glow {
            position: fixed;
            left: 50%;
            bottom: 6%;
            width: min(640px, 90vw);
            height: 110px;
            transform: translateX(-50%);
            background: radial-gradient(ellipse, rgba(255, 45, 117, 0.34), transparent 65%);
            filter: blur(18px);
            pointer-events: none;
            opacity: 0.85;
            z-index: 1;
        }

        @media (max-width: 520px) {
            .heart-wrap {
                width: 106vw;
            }
            .heart-word {
                font-size: 7px;
            }
            .open-heart-btn {
                bottom: -38px;
                padding: 12px 22px;
                font-size: 12px;
                letter-spacing: 0.8px;
            }
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            .gallery-card {
                border-radius: 12px;
            }
            .gallery-card.landscape {
                grid-column: span 2;
            }
            .gallery-top-bar {
                padding: 12px 14px 6px;
            }
            .gallery-bottom-bar {
                padding: 8px 14px 14px;
            }
            .gallery-scroll-view {
                padding: 6px 10px 14px;
            }
            .gallery-close {
                width: 36px;
                height: 36px;
                font-size: 16px;
            }
            .play-pause-btn {
                width: 34px;
                height: 34px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <main class="stage" id="stage">
        <section class="intro" id="intro">
            <h1 class="main-title">Click below button to see asif heart</h1>
            <div class="log">
                <div class="log-line">[system] Initializing HEART_PROTOCOL_v2.0...</div>
                <div class="log-line">[status] Loading memory fragments...</div>
                <div class="log-line">[fonts] Preloading custom heart font for you...</div>
                <div class="log-line">[ready] One message is waiting.</div>
            </div>
            <button class="button" id="startBtn">See the heart ❤️</button>
        </section>

        <section class="heart-wrap" id="heart">
            <button class="open-heart-btn" id="openHeartBtn">💖 Open My Heart 💖</button>
        </section>
        <div class="glow"></div>
    </main>

    <!-- ── Full-Page Cinematic Gallery Overlay ── -->
    <div class="gallery-overlay" id="galleryOverlay">
        <div class="gallery-stage" id="galleryStage">
            <!-- Top bar -->
            <div class="gallery-top-bar">
                <p class="gallery-title">💖 My Heart, My Sayali 💖</p>
                <button class="gallery-close" id="galleryClose" aria-label="Close gallery">✕</button>
            </div>

            <!-- Scrollable grid -->
            <div class="gallery-scroll-view" id="galleryScrollView">
                <div class="gallery-grid" id="galleryGrid">
                    <!-- Cards injected by JS -->
                </div>
            </div>

            <!-- Bottom bar -->
            <div class="gallery-bottom-bar">
                <div class="progress-track" id="progressTrack" title="Click to seek">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <button class="play-pause-btn" id="playPauseBtn" aria-label="Play/Pause auto-scroll" title="Play/Pause auto-scroll">⏯</button>
                <span class="time-indicator" id="timeIndicator">3:00</span>
            </div>
        </div>
    </div>

    <!-- Background music -->
    <audio id="bgMusic" preload="auto" loop style="display:none;">
        <source src="Hey There Delilah.mp3" type="audio/mpeg">
    </audio>

    <script>
        (function() {
            const heart = document.getElementById("heart");
            const intro = document.getElementById("intro");
            const startBtn = document.getElementById("startBtn");
            const audio = document.getElementById("bgMusic");
            const openHeartBtn = document.getElementById("openHeartBtn");
            const galleryOverlay = document.getElementById("galleryOverlay");
            const galleryGrid = document.getElementById("galleryGrid");
            const galleryScrollView = document.getElementById("galleryScrollView");
            const galleryClose = document.getElementById("galleryClose");
            const progressFill = document.getElementById("progressFill");
            const progressTrack = document.getElementById("progressTrack");
            const playPauseBtn = document.getElementById("playPauseBtn");
            const timeIndicator = document.getElementById("timeIndicator");
            const galleryStage = document.getElementById("galleryStage");

            // ── Supabase image URLs ──
            const photoUrls = [
                "https://lmfxlwbzllorzbtyowce.supabase.co/storage/v1/object/public/Sayali/6BE1C9FA-6CA5-47B5-9987-428189A35FFF.jpeg",
                "https://lmfxlwbzllorzbtyowce.supabase.co/storage/v1/object/public/Sayali/IMG-20240314-WA0005_Original.jpeg",
                "https://lmfxlwbzllorzbtyowce.supabase.co/storage/v1/object/public/Sayali/IMG-20240314-WA0010_Original.jpeg",
                "https://lmfxlwbzllorzbtyowce.supabase.co/storage/v1/object/public/Sayali/IMG_3381.jpeg",
                "https://lmfxlwbzllorzbtyowce.supabase.co/storage/v1/object/public/Sayali/IMG_3389.jpeg",
                "https://lmfxlwbzllorzbtyowce.supabase.co/storage/v1/object/public/Sayali/IMG_4268.jpeg",
                "https://lmfxlwbzllorzbtyowce.supabase.co/storage/v1/object/public/Sayali/secret.bo_x_14031004_052532842_Original.jpeg",
                "https://lmfxlwbzllorzbtyowce.supabase.co/storage/v1/object/public/Sayali/secret.bo_x_14031004_052532868_Original.jpeg",
                "https://lmfxlwbzllorzbtyowce.supabase.co/storage/v1/object/public/Sayali/secret.bo_x_14031004_052546651_Original.jpeg",
                "https://lmfxlwbzllorzbtyowce.supabase.co/storage/v1/object/public/Sayali/secret.bo_x_14031004_052546662_Original.jpeg",
                "https://lmfxlwbzllorzbtyowce.supabase.co/storage/v1/object/public/Sayali/secret.bo_x_14031004_052549757_Original.jpeg",
                "https://lmfxlwbzllorzbtyowce.supabase.co/storage/v1/object/public/Sayali/secret.bo_x_14031004_052549771_Original.jpeg",
            ];

            const romanticCaptions = [
                "My everything 💕",
                "Forever yours 🌹",
                "Beautiful moment ✨",
                "My heart beats for you 💗",
                "Endless love ♾️",
                "You & me 💑",
                "Precious memory 📸",
                "My world 🌍",
                "Soulmate 💫",
                "Always & forever 💖",
                "Dream come true 🌙",
                "Love of my life ❤️",
            ];

            // ── Heart words generation ──
            const words = ["I love you", "love you", "forever", "my heart", "<3"];
            const points = [];
            const step = 0.105;
            for (let y = 1.35; y >= -1.25; y -= step) {
                for (let x = -1.45; x <= 1.45; x += step) {
                    const v = Math.pow(x * x + y * y - 1, 3) - x * x * Math.pow(y, 3);
                    if (v <= 0) {
                        const px = 50 + x * 31;
                        const py = 53 - y * 35;
                        const centerBoost = 1 - Math.min(1, Math.hypot(x, y) / 1.55);
                        points.push({ x: px, y: py, boost: centerBoost });
                    }
                }
            }

            function makeHeart() {
                const fragment = document.createDocumentFragment();
                points.forEach((point, index) => {
                    const span = document.createElement("span");
                    span.className = "heart-word";
                    span.textContent = words[(index + Math.floor(point.x)) % words.length];
                    const delay = Math.random() * 900 + point.y * 4;
                    const hue = 336 + Math.random() * 15;
                    const light = 50 + point.boost * 34 + Math.random() * 8;
                    const opacity = 0.56 + point.boost * 0.42;
                    const rot = (Math.random() * 10 - 5).toFixed(2) + "deg";
                    span.style.setProperty("--x", point.x.toFixed(3));
                    span.style.setProperty("--y", point.y.toFixed(3));
                    span.style.setProperty("--delay", delay.toFixed(0));
                    span.style.setProperty("--hue", hue.toFixed(1));
                    span.style.setProperty("--light", light.toFixed(1) + "%");
                    span.style.setProperty("--opacity", opacity.toFixed(2));
                    span.style.setProperty("--rot", rot);
                    fragment.appendChild(span);
                });
                const center = document.createElement("div");
                center.className = "center-text";
                center.textContent = "Sayali, I love you ♾️❤️";
                fragment.appendChild(center);

                const existingWords = heart.querySelectorAll(".heart-word");
                const existingCenter = heart.querySelector(".center-text");
                existingWords.forEach(el => el.remove());
                if (existingCenter) existingCenter.remove();
                heart.appendChild(fragment);
            }

            function playAudio() {
                if (audio) audio.play().catch(() => {});
            }

            function showHeart() {
                makeHeart();
                intro.classList.add("hide");
                heart.classList.add("show");
                playAudio();
            }

            // ── Auto-scroll state ──
            const SCROLL_DURATION_MS = 180000; // 3 minutes
            let autoScrollRAF = null;
            let autoScrollActive = false;
            let autoScrollPaused = false;
            let scrollStartTime = 0;
            let scrollStartPosition = 0;
            let totalScrollDistance = 0;
            let pausedAtPosition = 0;
            let pausedElapsed = 0;
            let userInteractTimeout = null;
            const USER_INACTIVITY_DELAY = 3000; // resume after 3s of no user scroll

            function getTotalScrollDistance() {
                return Math.max(0, galleryScrollView.scrollHeight - galleryScrollView.clientHeight);
            }

            function updateProgress() {
                const dist = getTotalScrollDistance();
                if (dist <= 0) {
                    progressFill.style.width = "0%";
                    return;
                }
                const pct = Math.min(100, (galleryScrollView.scrollTop / dist) * 100);
                progressFill.style.width = pct + "%";
            }

            function updateTimeDisplay(remainingSeconds) {
                const mins = Math.floor(remainingSeconds / 60);
                const secs = Math.floor(remainingSeconds % 60);
                timeIndicator.textContent = mins + ":" + String(secs).padStart(2, "0");
            }

            function stopAutoScroll() {
                if (autoScrollRAF) {
                    cancelAnimationFrame(autoScrollRAF);
                    autoScrollRAF = null;
                }
                autoScrollActive = false;
                autoScrollPaused = false;
                progressFill.classList.remove("paused");
                playPauseBtn.textContent = "▶";
                if (userInteractTimeout) {
                    clearTimeout(userInteractTimeout);
                    userInteractTimeout = null;
                }
            }

            function startAutoScroll(fromPosition, elapsedAlready) {
                stopAutoScroll();
                totalScrollDistance = getTotalScrollDistance();
                if (totalScrollDistance <= 1) {
                    updateProgress();
                    updateTimeDisplay(0);
                    return;
                }

                scrollStartPosition = Math.min(fromPosition, totalScrollDistance);
                scrollStartTime = performance.now() - (elapsedAlready || 0);
                autoScrollActive = true;
                autoScrollPaused = false;
                progressFill.classList.remove("paused");
                playPauseBtn.textContent = "⏸";

                const speed = totalScrollDistance / SCROLL_DURATION_MS; // pixels per ms

                function tick(now) {
                    if (!autoScrollActive) return;
                    if (autoScrollPaused) {
                        autoScrollRAF = requestAnimationFrame(tick);
                        return;
                    }
                    const elapsed = now - scrollStartTime;
                    let targetPos = scrollStartPosition + speed * elapsed;
                    targetPos = Math.min(targetPos, totalScrollDistance);
                    galleryScrollView.scrollTop = targetPos;
                    updateProgress();

                    const remainingDistance = totalScrollDistance - targetPos;
                    const remainingTime = speed > 0 ? remainingDistance / speed : 0;
                    updateTimeDisplay(remainingTime / 1000);

                    if (targetPos >= totalScrollDistance - 1) {
                        // Reached the end
                        stopAutoScroll();
                        updateProgress();
                        updateTimeDisplay(0);
                        progressFill.style.width = "100%";
                        playPauseBtn.textContent = "⟳";
                        return;
                    }
                    autoScrollRAF = requestAnimationFrame(tick);
                }

                autoScrollRAF = requestAnimationFrame(tick);
            }

            function pauseAutoScroll() {
                if (!autoScrollActive || autoScrollPaused) return;
                autoScrollPaused = true;
                pausedAtPosition = galleryScrollView.scrollTop;
                pausedElapsed = performance.now() - scrollStartTime;
                progressFill.classList.add("paused");
                playPauseBtn.textContent = "▶";
            }

            function resumeAutoScroll() {
                if (!autoScrollActive || !autoScrollPaused) return;
                autoScrollPaused = false;
                progressFill.classList.remove("paused");
                playPauseBtn.textContent = "⏸";
                // Restart from current position with adjusted timing
                const currentPos = galleryScrollView.scrollTop;
                const dist = getTotalScrollDistance();
                if (dist <= 1) return;
                const speed = dist / SCROLL_DURATION_MS;
                const effectiveElapsed = (currentPos - scrollStartPosition) / speed;
                scrollStartTime = performance.now() - Math.max(0, effectiveElapsed);
                if (userInteractTimeout) clearTimeout(userInteractTimeout);
                userInteractTimeout = null;
            }

            function togglePlayPause() {
                if (!autoScrollActive) {
                    // Start fresh
                    const dist = getTotalScrollDistance();
                    if (dist <= 1) return;
                    const currentPos = galleryScrollView.scrollTop;
                    const speed = dist / SCROLL_DURATION_MS;
                    const effectiveElapsed = currentPos / speed;
                    startAutoScroll(0, 0);
                    galleryScrollView.scrollTop = currentPos;
                    scrollStartPosition = 0;
                    scrollStartTime = performance.now() - effectiveElapsed;
                    return;
                }
                if (autoScrollPaused) {
                    resumeAutoScroll();
                } else {
                    pauseAutoScroll();
                }
            }

            function onUserScrollActivity() {
                if (!autoScrollActive) return;
                if (autoScrollPaused) {
                    // Reset the inactivity timer
                    if (userInteractTimeout) clearTimeout(userInteractTimeout);
                    userInteractTimeout = setTimeout(() => {
                        resumeAutoScroll();
                    }, USER_INACTIVITY_DELAY);
                    return;
                }
                // User scrolled while auto-scroll was active
                pauseAutoScroll();
                if (userInteractTimeout) clearTimeout(userInteractTimeout);
                userInteractTimeout = setTimeout(() => {
                    resumeAutoScroll();
                }, USER_INACTIVITY_DELAY);
            }

            // ── Build gallery cards ──
            function buildGalleryCards() {
                galleryGrid.innerHTML = "";
                photoUrls.forEach((url, index) => {
                    const card = document.createElement("div");
                    card.className = "gallery-card loading";
                    card.setAttribute("data-index", index);

                    const img = document.createElement("img");
                    img.src = url;
                    img.alt = "Sayali photo " + (index + 1);
                    img.loading = "lazy";
                    img.style.opacity = "0";
                    img.style.transition = "opacity 0.4s ease";

                    const caption = document.createElement("div");
                    caption.className = "card-caption";
                    caption.textContent = romanticCaptions[index % romanticCaptions.length];

                    img.onload = function() {
                        card.classList.remove("loading");
                        img.style.opacity = "1";
                        const ratio = this.naturalWidth / this.naturalHeight;
                        if (ratio > 1.25) {
                            card.classList.add("landscape");
                            card.style.aspectRatio = "4 / 3";
                        } else if (ratio < 0.85) {
                            card.style.aspectRatio = "3 / 4";
                        } else {
                            card.classList.add("square-ish");
                            card.style.aspectRatio = "1 / 1";
                        }
                    };

                    img.onerror = function() {
                        card.classList.remove("loading");
                        card.style.display = "grid";
                        card.style.placeItems = "center";
                        card.style.color = "#ff7aa8";
                        card.style.fontSize = "13px";
                        card.style.aspectRatio = "3/4";
                        card.textContent = "💔";
                        caption.textContent = "Photo " + (index + 1);
                        card.appendChild(caption);
                    };

                    card.appendChild(img);
                    card.appendChild(caption);
                    galleryGrid.appendChild(card);
                });

                // Also check already-cached images
                setTimeout(() => {
                    galleryGrid.querySelectorAll("img").forEach(img => {
                        if (img.complete && img.naturalWidth > 0) {
                            const card = img.closest(".gallery-card");
                            if (card && card.classList.contains("loading")) {
                                card.classList.remove("loading");
                                img.style.opacity = "1";
                                const ratio = img.naturalWidth / img.naturalHeight;
                                if (ratio > 1.25) {
                                    card.classList.add("landscape");
                                    card.style.aspectRatio = "4 / 3";
                                } else if (ratio < 0.85) {
                                    card.style.aspectRatio = "3 / 4";
                                } else {
                                    card.classList.add("square-ish");
                                    card.style.aspectRatio = "1 / 1";
                                }
                            }
                        }
                    });
                }, 300);
            }

            // ── Open / Close gallery ──
            function openGallery() {
                buildGalleryCards();
                galleryOverlay.classList.add("active");
                document.body.style.overflow = "hidden";
                galleryScrollView.scrollTop = 0;
                updateProgress();
                updateTimeDisplay(180);
                stopAutoScroll();
                progressFill.style.width = "0%";
                playPauseBtn.textContent = "⏯";

                // Small delay then start auto-scroll
                setTimeout(() => {
                    const dist = getTotalScrollDistance();
                    if (dist > 1) {
                        startAutoScroll(0, 0);
                    }
                }, 1800);
            }

            function closeGallery() {
                stopAutoScroll();
                galleryOverlay.classList.remove("active");
                document.body.style.overflow = "";
                if (userInteractTimeout) {
                    clearTimeout(userInteractTimeout);
                    userInteractTimeout = null;
                }
            }

            // ── Progress track click to seek ──
            progressTrack.addEventListener("click", function(e) {
                const rect = this.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const fraction = Math.max(0, Math.min(1, clickX / rect.width));
                const dist = getTotalScrollDistance();
                const targetScroll = fraction * dist;
                galleryScrollView.scrollTop = targetScroll;
                updateProgress();

                if (autoScrollActive) {
                    pauseAutoScroll();
                    if (userInteractTimeout) clearTimeout(userInteractTimeout);
                    userInteractTimeout = setTimeout(() => {
                        resumeAutoScroll();
                    }, USER_INACTIVITY_DELAY);
                }

                const remainingDist = dist - targetScroll;
                const speed = dist / SCROLL_DURATION_MS;
                const remainingTime = speed > 0 ? remainingDist / speed : 0;
                updateTimeDisplay(remainingTime / 1000);
            });

            // ── Event listeners ──
            startBtn.addEventListener("click", showHeart);
            openHeartBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                openGallery();
            });
            galleryClose.addEventListener("click", closeGallery);
            galleryOverlay.addEventListener("click", function(e) {
                if (e.target === galleryOverlay) closeGallery();
            });
            playPauseBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                // If scroll completed (button shows ⟳), restart
                if (playPauseBtn.textContent === "⟳") {
                    galleryScrollView.scrollTop = 0;
                    updateProgress();
                    const dist = getTotalScrollDistance();
                    if (dist > 1) {
                        startAutoScroll(0, 0);
                    }
                    return;
                }
                togglePlayPause();
            });

            // Scroll event on the gallery scroll view
            galleryScrollView.addEventListener("scroll", function() {
                updateProgress();
                if (autoScrollActive && !autoScrollPaused) {
                    // Check if this scroll event was triggered by our own RAF
                    // We use a flag, but simpler: if the difference between
                    // expected position and actual is large, user intervened.
                    const dist = getTotalScrollDistance();
                    if (dist <= 1) return;
                    const speed = dist / SCROLL_DURATION_MS;
                    const elapsed = performance.now() - scrollStartTime;
                    const expectedPos = scrollStartPosition + speed * elapsed;
                    const actualPos = galleryScrollView.scrollTop;
                    const threshold = Math.max(8, dist * 0.015);
                    if (Math.abs(actualPos - expectedPos) > threshold) {
                        onUserScrollActivity();
                    }
                }
            }, { passive: true });

            // Wheel event for manual scroll detection
            galleryScrollView.addEventListener("wheel", function() {
                if (autoScrollActive && !autoScrollPaused) {
                    onUserScrollActivity();
                }
            }, { passive: true });

            // Touch events
            galleryScrollView.addEventListener("touchstart", function() {
                if (autoScrollActive && !autoScrollPaused) {
                    onUserScrollActivity();
                }
            }, { passive: true });

            // Keyboard controls
            document.addEventListener("keydown", function(event) {
                if (event.key === "Enter" || event.key === " ") {
                    if (!heart.classList.contains("show")) {
                        showHeart();
                        return;
                    }
                }
                if (galleryOverlay.classList.contains("active")) {
                    if (event.key === "Escape") {
                        closeGallery();
                    } else if (event.key === " " && event.target === document.body) {
                        event.preventDefault();
                        togglePlayPause();
                    } else if (event.key === "ArrowDown" && autoScrollActive && !autoScrollPaused) {
                        onUserScrollActivity();
                    } else if (event.key === "ArrowUp" && autoScrollActive && !autoScrollPaused) {
                        onUserScrollActivity();
                    }
                }
            });

            // Mouse move 3D tilt for the heart
            window.addEventListener("mousemove", function(event) {
                if (!heart.classList.contains("show")) return;
                const x = (event.clientX / window.innerWidth - 0.5) * 10;
                const y = (event.clientY / window.innerHeight - 0.5) * -8;
                heart.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
            });

            // Autoplay audio
            document.addEventListener("DOMContentLoaded", function() {
                playAudio();
            });
            document.addEventListener("click", function audioFallback() {
                if (audio && audio.paused && !heart.classList.contains("show")) {
                    playAudio();
                }
                document.removeEventListener("click", audioFallback);
            }, { once: true });

            // Build gallery on load
            buildGalleryCards();

            console.log("💖 All set! Click 'See the heart' then 'Open My Heart' for the cinematic gallery.");
        })();
    </script>
</body>
